name: CI

on:
    push:
        branches: [main]
    pull_request:

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v6
              with:
                  version: latest

            - uses: actions/setup-node@v6
              with:
                  node-version: "26"
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - run: pnpm format:check

            - run: pnpm lint

            - run: pnpm typecheck

            - run: pnpm build
